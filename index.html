
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclusive Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/react-image-crop/dist/ReactCrop.css">
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="high-contrast"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Open Sans', 'system-ui', 'sans-serif'],
                        dyslexic: ['OpenDyslexic', 'Comic Sans MS', 'sans-serif']
                    },
                    colors: {
                        primary: {
                            '50': '#f0f7ff',
                            '100': '#e0effe',
                            '200': '#c7e2fd',
                            '300': '#a3d2fc',
                            '400': '#7ac0fa',
                            '500': '#5fa9f7',
                            '600': '#468eef',
                            '700': '#3672de',
                            '800': '#2f5cb9',
                            '900': '#294c92',
                            '950': '#1c315f',
                        },
                        // High-contrast colors
                        hc: {
                            bg: '#000000',
                            text: '#FFFFFF',
                            accent: '#FFFF00',
                            interactive: '#00FFFF',
                        }
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.5s ease-in-out',
                    },
                },
            },
        }
    </script>
